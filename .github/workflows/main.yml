name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nguyendinhkhanh:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nguyendinhkhanh:${{ github.sha }} .
      
      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/nguyendinhkhanh:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/nguyendinhkhanh:${{ github.sha }}
